name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.4'
          cache: true

      - name: Enable Android
        run: |
          flutter config --enable-android
          flutter doctor -v

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses

      - name: Generate project + inject blueprint
        run: |
          bash scripts/generate_project.sh pomopet ./_app ./pomopet_blueprint

      - name: Flutter analyze
        working-directory: ./_app
        run: |
          flutter analyze | tee ../flutter-analyze.log

      - name: Build debug APK
        working-directory: ./_app
        run: |
          flutter build apk --debug -v | tee ../flutter-build-apk.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pomopet-debug-apk
          path: _app/build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload generated project
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pomopet-generated-project
          path: _app

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pomopet-build-logs
          path: |
            flutter-analyze.log
            flutter-build-apk.log
